name: Runtime telemetry alerts (reusable)

on:
  workflow_call:
    inputs:
      app_name:
        description: Friendly name used in alert messages.
        required: false
        type: string
        default: nextjs-saas-boilerplate
      app_base_url:
        description: Optional base URL for lightweight runtime endpoint checks.
        required: false
        type: string
        default: ""
      window_minutes:
        description: Rolling lookback window for telemetry checks.
        required: false
        type: string
        default: "60"
      posthog_exception_threshold:
        description: Trigger alert when PostHog exception count in window exceeds this.
        required: false
        type: string
        default: "5"
      axiom_error_threshold:
        description: Trigger alert when Axiom error count in window exceeds this.
        required: false
        type: string
        default: "5"
      axiom_error_apl:
        description: Optional override for Axiom APL filter expression.
        required: false
        type: string
        default: ""
      check_http_endpoints:
        description: Enable lightweight HTTP smoke checks.
        required: false
        type: string
        default: "true"
      send_to_telegram:
        description: Set "true" to send Telegram alerts when thresholds are breached.
        required: false
        type: string
        default: "false"
      dry_run:
        description: Set "true" to collect and evaluate alerts without outbound messaging.
        required: false
        type: string
        default: "false"
    secrets:
      POSTHOG_HOST:
        required: false
      POSTHOG_PROJECT_ID:
        required: false
      POSTHOG_PERSONAL_API_KEY:
        required: false
      AXIOM_QUERY_DOMAIN:
        required: false
      AXIOM_API_TOKEN:
        required: false
      AXIOM_DATASET:
        required: false
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
      TELEGRAM_THREAD_ID:
        required: false

permissions: {}

jobs:
  monitor:
    name: Evaluate telemetry thresholds
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    env:
      APP_NAME: ${{ inputs.app_name }}
      APP_BASE_URL: ${{ inputs.app_base_url }}
      WINDOW_MINUTES: ${{ inputs.window_minutes }}
      POSTHOG_EXCEPTION_THRESHOLD: ${{ inputs.posthog_exception_threshold }}
      AXIOM_ERROR_THRESHOLD: ${{ inputs.axiom_error_threshold }}
      AXIOM_ERROR_APL: ${{ inputs.axiom_error_apl }}
      CHECK_HTTP_ENDPOINTS: ${{ inputs.check_http_endpoints }}
      SEND_TO_TELEGRAM: ${{ inputs.send_to_telegram }}
      DRY_RUN: ${{ inputs.dry_run }}
      POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
      POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
      POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
      AXIOM_QUERY_DOMAIN: ${{ secrets.AXIOM_QUERY_DOMAIN }}
      AXIOM_API_TOKEN: ${{ secrets.AXIOM_API_TOKEN }}
      AXIOM_DATASET: ${{ secrets.AXIOM_DATASET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}

    steps:
      - name: Check runtime signals and build alert payload
        shell: bash
        run: |
          set -euo pipefail

          extract_count() {
            local payload="$1"
            local expression="$2"
            local value

            value="$(jq -r "${expression}" <<<"$payload" 2>/dev/null || echo "0")"
            value="${value//[$'\t\n\r ']/}"

            if [[ "$value" == "" || "$value" == "null" ]]; then
              echo 0
              return
            fi

            if [[ "$value" =~ ^[0-9]+$ ]]; then
              echo "$value"
            else
              echo 0
            fi
          }

          alerts=()
          warnings=()

          APP_NAME="${APP_NAME:-nextjs-saas-boilerplate}"
          APP_BASE_URL="${APP_BASE_URL:-}"
          WINDOW_MINUTES="${WINDOW_MINUTES:-60}"
          POSTHOG_EXCEPTION_THRESHOLD="${POSTHOG_EXCEPTION_THRESHOLD:-5}"
          AXIOM_ERROR_THRESHOLD="${AXIOM_ERROR_THRESHOLD:-5}"
          AXIOM_ERROR_APL="${AXIOM_ERROR_APL:-}"
          CHECK_HTTP_ENDPOINTS="${CHECK_HTTP_ENDPOINTS:-true}"
          SEND_TO_TELEGRAM="${SEND_TO_TELEGRAM:-false}"
          DRY_RUN="${DRY_RUN:-false}"
          POSTHOG_HOST="${POSTHOG_HOST:-https://us.i.posthog.com}"
          AXIOM_QUERY_DOMAIN="${AXIOM_QUERY_DOMAIN:-us-east-1.aws.edge.axiom.co}"

          if ! [[ "$WINDOW_MINUTES" =~ ^[0-9]+$ ]]; then
            WINDOW_MINUTES=60
          fi

          if ! [[ "$POSTHOG_EXCEPTION_THRESHOLD" =~ ^[0-9]+$ ]]; then
            POSTHOG_EXCEPTION_THRESHOLD=5
          fi

          if ! [[ "$AXIOM_ERROR_THRESHOLD" =~ ^[0-9]+$ ]]; then
            AXIOM_ERROR_THRESHOLD=5
          fi

          check_http() {
            local name="$1"
            local path="$2"
            local code
            local url="${APP_BASE_URL%/}$path"

            code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 "$url" || echo '000')"

            if [[ "$code" == "000" ]]; then
              alerts+=("$name: request failed (timeout/network) — ${url}")
              return
            fi

            if [[ "$code" =~ ^5 ]]; then
              alerts+=("$name: HTTP ${code} — ${url}")
            fi
          }

          if [[ "${CHECK_HTTP_ENDPOINTS,,}" == "true" ]]; then
            if [[ -z "$APP_BASE_URL" ]]; then
              warnings+=("HTTP checks enabled but app_base_url is empty.")
            else
              check_http "Homepage" "/"
              check_http "Auth session" "/api/auth/session"
            fi
          fi

          if [[ -n "${POSTHOG_PERSONAL_API_KEY:-}" && -n "${POSTHOG_PROJECT_ID:-}" ]]; then
            PH_QUERY="SELECT count() AS c FROM events WHERE event = '\$exception' AND timestamp >= now() - INTERVAL ${WINDOW_MINUTES} MINUTE"
            PH_PAYLOAD="$(jq -nc --arg q "$PH_QUERY" --arg n "${APP_NAME}-runtime-exception-check" '{query:{kind:"HogQLQuery",query:$q},name:$n}')"
            PH_RESPONSE=""

            if ! PH_RESPONSE="$(curl -sS -X POST "${POSTHOG_HOST%/}/api/projects/${POSTHOG_PROJECT_ID}/query/" \
              -H "Authorization: Bearer ${POSTHOG_PERSONAL_API_KEY}" \
              -H 'Content-Type: application/json' \
              --max-time 20 \
              --data "$PH_PAYLOAD")"; then
              warnings+=("PostHog query request failed (host: ${POSTHOG_HOST}).")
            fi

            if [[ -n "${PH_RESPONSE:-}" ]]; then
              PH_COUNT="$(extract_count "$PH_RESPONSE" '.results[0][0] // .result[0][0] // .results[0].c // .result[0].c // 0')"
              if (( PH_COUNT >= POSTHOG_EXCEPTION_THRESHOLD )); then
                alerts+=("PostHog exceptions: ${PH_COUNT} in last ${WINDOW_MINUTES}m (threshold ${POSTHOG_EXCEPTION_THRESHOLD})")
              fi
            else
              warnings+=("PostHog query returned no data.")
            fi
          else
            warnings+=("PostHog query skipped: POSTHOG_PERSONAL_API_KEY and POSTHOG_PROJECT_ID are not both set.")
          fi

          if [[ -n "${AXIOM_API_TOKEN:-}" && -n "${AXIOM_DATASET:-}" ]]; then
            if [[ -z "$AXIOM_ERROR_APL" ]]; then
              AXIOM_ERROR_APL='level == "error" or severity == "error" or severity_text == "error"'
            fi

            AX_QUERY="['${AXIOM_DATASET}'] | where _time > ago(${WINDOW_MINUTES}m) | where ${AXIOM_ERROR_APL} | summarize error_count = count()"
            AX_PAYLOAD="$(jq -nc --arg apl "$AX_QUERY" '{apl:$apl}')"
            AX_RESPONSE=""

            if ! AX_RESPONSE="$(curl -sS -X POST "https://${AXIOM_QUERY_DOMAIN}/v1/query/_apl?format=tabular" \
              -H "Authorization: Bearer ${AXIOM_API_TOKEN}" \
              -H 'Content-Type: application/json' \
              --max-time 20 \
              --data "$AX_PAYLOAD")"; then
              warnings+=("Axiom query request failed (domain: ${AXIOM_QUERY_DOMAIN}).")
            fi

            if [[ -n "${AX_RESPONSE:-}" ]]; then
              AX_COUNT="$(extract_count "$AX_RESPONSE" '.tables[0].columns[0][0] // .tables[0].rows[0][0] // 0')"
              if (( AX_COUNT >= AXIOM_ERROR_THRESHOLD )); then
                alerts+=("Axiom filtered errors: ${AX_COUNT} in last ${WINDOW_MINUTES}m (threshold ${AXIOM_ERROR_THRESHOLD}, filter: ${AXIOM_ERROR_APL})")
              fi
            else
              warnings+=("Axiom query returned no data.")
            fi
          else
            warnings+=("Axiom query skipped: AXIOM_API_TOKEN and AXIOM_DATASET are not both set.")
          fi

          if (( ${#alerts[@]} == 0 )); then
            printf 'No alert threshold triggered for %s\n' "$APP_NAME"
            if (( ${#warnings[@]} > 0 )); then
              printf 'Warnings:\n'
              printf -- '- %s\n' "${warnings[@]}"
            fi
            exit 0
          fi

          if [[ "${SEND_TO_TELEGRAM,,}" != "true" || "${DRY_RUN,,}" == "true" ]]; then
            printf 'Alert conditions crossed for %s but Telegram delivery is disabled for this run.\n' "$APP_NAME"
            printf -- '- %s\n' "${alerts[@]}"
            if (( ${#warnings[@]} > 0 )); then
              printf 'Warnings:\n'
              printf -- '- %s\n' "${warnings[@]}"
            fi
            exit 0
          fi

          if [[ -z "${TELEGRAM_BOT_TOKEN:-}" || -z "${TELEGRAM_CHAT_ID:-}" ]]; then
            echo "Telegram alerts enabled but TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID are missing." >&2
            exit 1
          fi

          NOW_UTC="$(date -u +'%Y-%m-%d %H:%M UTC')"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          MESSAGE=$(
            {
              echo "🚨 Runtime alert (${APP_NAME})"
              echo "Window: last ${WINDOW_MINUTES}m"
              echo "Time: ${NOW_UTC}"
              echo
              printf -- '- %s\n' "${alerts[@]}"
              if (( ${#warnings[@]} > 0 )); then
                echo
                printf -- '- warning: %s\n' "${warnings[@]}"
              fi
              echo
              echo "Run: ${RUN_URL}"
            }
          )

          API_URL="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
          ARGS=(
            --fail-with-body
            -sS
            -X POST "$API_URL"
            -d "chat_id=${TELEGRAM_CHAT_ID}"
            --data-urlencode "text=${MESSAGE}"
            -d "disable_web_page_preview=true"
          )

          if [[ -n "${TELEGRAM_THREAD_ID:-}" ]]; then
            ARGS+=( -d "message_thread_id=${TELEGRAM_THREAD_ID}" )
          fi

          curl "${ARGS[@]}"
