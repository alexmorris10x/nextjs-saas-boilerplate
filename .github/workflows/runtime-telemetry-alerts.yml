name: Runtime telemetry -> Telegram

on:
  schedule:
    # Hourly check to stay within free-tier GitHub/observability budgets.
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: runtime-telemetry-alerts
  cancel-in-progress: false

permissions: {}

jobs:
  runtime-telemetry-alerts:
    uses: ./.github/workflows/runtime-telemetry-alerts.template.yml
    with:
      app_name: ${{ vars.RUNTIME_APP_NAME || github.event.repository.name }}
      app_base_url: ${{ vars.RUNTIME_BASE_URL }}
      window_minutes: ${{ vars.RUNTIME_TELEMETRY_WINDOW_MINUTES || '60' }}
      posthog_exception_threshold: ${{ vars.RUNTIME_POSTHOG_EXCEPTION_THRESHOLD || '5' }}
      axiom_error_threshold: ${{ vars.RUNTIME_AXIOM_ERROR_THRESHOLD || '5' }}
      axiom_error_apl: ${{ vars.RUNTIME_AXIOM_ERROR_APL }}
      check_http_endpoints: ${{ vars.RUNTIME_HTTP_CHECKS_ENABLED || 'true' }}
      send_to_telegram: ${{ vars.RUNTIME_ALERTS_ENABLED || 'false' }}
      dry_run: ${{ vars.RUNTIME_TELEMETRY_DRY_RUN || 'false' }}
    secrets: inherit
